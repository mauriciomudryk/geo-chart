<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Mapa 3D com Posição Geográfica</title>
    <style>
      html,
      body,
      #map {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      .chart-label {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        color: white;
        font-size: 14px;
        font-weight: bold;
        padding: 4px 8px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 4px;
      }
      #menu {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(255, 255, 255, 0.8);
        padding: 10px;
        border-radius: 5px;
        z-index: 1;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }
    </style>

    <!-- Three.js Legacy (r146 para OBJLoader global) -->
    <script src="https://unpkg.com/three@0.146.0/build/three.js"></script>

    <!-- Google Maps JS API (beta) -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDStbM88H1onMcq-p3VzeSaJOLQy7ORCAc&v=beta"></script>
    <script src="https://unpkg.com/three@0.146.0/examples/js/renderers/CSS2DRenderer.js"></script>

    <script type="module">
      const isDevelopment =
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1" ||
        window.location.hostname.startsWith("geo-chart.local");

      async function loadChart() {
        let geoChartURL;

        if (isDevelopment) {
          geoChartURL = "/geo-chart.js"; // Caminho para o arquivo local em desenvolvimento
        } else {
          // Busca o arquivo 'version' para obter a versão mais recente
          geoChartURL = `https://unpkg.com/geo-chart@1.0.5/dist/geo-chart.js`;
        }

        // Importa dinamicamente baseado no ambiente
        const { GeoChart, ChartType } = await import(geoChartURL);

        const dadosRandomicos = Array.from({ length: 10 }, () => ({
          value: Math.floor(Math.random() * 200001) - 100000,
        }));

        new GeoChart({
          map,
          data: [{ lat: graphLat, lng: graphLng, dados: dadosRandomicos }],
          options: {
            type: ChartType.Bar3D,
            width: 250,
            height: 200,
            data: dadosRandomicos,
          },
        });
      }

      loadChart();
    </script>
  </head>
  <body>
    <div id="map"></div>

    <script>
      const graphLat = -25.421987331693845; // latitude do gráfico
      const graphLng = -51.604127114604005; // longitude do gráfico

      const map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: graphLat, lng: graphLng },
        zoom: 18,
        tilt: 67.5,
        heading: 0,
        mapId: "21b4bdb27aaeb1b8d672bc2b",
      });
    </script>
  </body>
</html>
