<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Mapa 3D com Posição Geográfica</title>
    <style>
      html,
      body,
      #map {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      .chart-label {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        color: white;
        font-size: 14px;
        font-weight: bold;
        padding: 4px 8px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 4px;
      }
      #menu {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(255, 255, 255, 0.8);
        padding: 10px;
        border-radius: 5px;
        z-index: 1;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }
    </style>

    <!-- Three.js Legacy (r146 para OBJLoader global) -->
    <script src="https://unpkg.com/three@0.146.0/build/three.js"></script>

    <!-- Google Maps JS API (beta) -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDStbM88H1onMcq-p3VzeSaJOLQy7ORCAc&v=beta"></script>
    <script src="https://unpkg.com/three@0.146.0/examples/js/renderers/CSS2DRenderer.js"></script>

    <script type="module">
      import { GeoChart } from "https://unpkg.com/geo-chart@1.0.2/dist/geo-chart.js"
      import { ChartType } from "https://unpkg.com/geo-chart@1.0.2/dist/geo-chart.js";
      const dadosRandomicos = Array.from({ length: 10 }, () => ({
        value: Math.floor(Math.random() * 200001) - 100000, // -100 a 100 inclusive
      }));      
      const chart = new GeoChart({
        map,
        data: [{ lat: graphLat, lng: graphLng, dadosRandomicos }],
        options: {
            type: ChartType.Bar3D,
            width: 250,
            height: 200,
            data: dadosRandomicos
          }
      });
    </script>
</script>    
  </head>
  <body>
    <div id="map"></div>

    <script>
      const graphLat = -25.421987331693845; // latitude do gráfico
      const graphLng = -51.604127114604005; // longitude do gráfico

      const map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: graphLat, lng: graphLng },
        zoom: 18,
        tilt: 67.5,
        heading: 0,
        mapId: "21b4bdb27aaeb1b8d672bc2b",
      });
    </script>
  </body>
</html>
